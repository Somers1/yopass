version: "3.8"

services:
  memcached:
    image: memcached
    restart: always
    expose:
      - "11211"

  yopass:
    build:
      context: ./
      dockerfile: Dockerfile
    restart: always
    ports:
      - "0.0.0.0:80:80"
    environment:
      - MEMCACHED=memcached:11211
      - PORT=80
      - FILE_STORE=disk
      - FILE_STORE_PATH=/data/files
    volumes:
      - yopass-files:/data/files
    healthcheck:
      test: ["CMD", "/yopass-server", "--health-check"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  yopass-files:
